# ─── SMPTSA Ingestion Service ───

server:
  port: ${PORT:8081}

spring:
  application:
    name: smptsa-ingestion-service

  # ── PostgreSQL ──
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smptsa_db}
    username: ${DB_USER:smptsa}
    password: ${DB_PASSWORD:smptsa_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Kafka ──
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

# ── Ingestion config ──
ingestion:
  ticker: XAUUSD
  yahoo-finance-symbol: GC=F
  schedule:
    ohlcv-rate-ms: 300000        # 5 minutes
    social-rate-ms: 300000       # 5 minutes
  kafka:
    topic:
      market-data: raw-market-data
      social-data: raw-social-data

# ── Social API Keys ──
reddit:
  client-id: ${REDDIT_CLIENT_ID:}
  client-secret: ${REDDIT_CLIENT_SECRET:}
  user-agent: ${REDDIT_USER_AGENT:smptsa:v1.0}

newsapi:
  key: ${NEWSAPI_KEY:}

apify:
  token: ${APIFY_API_TOKEN:}

logging:
  level:
    com.smptsa: DEBUG
    org.springframework.kafka: INFO
